# Example configuration for comparing cross-document attention behavior
# This config shows how to set up A/B testing between allowing and blocking cross-document attention

# Configuration with cross-document attention ALLOWED (default behavior)
allowed_cross_attention:
  stages:
    - stage_name: sft_cross_attention_allowed
      stage_type: sft
      num_train_epochs: 1
      per_device_train_batch_size: 4
      per_device_eval_batch_size: 4
      gradient_accumulation_steps: 1
      learning_rate: 5e-5
      max_length: 512
      
      # Packing settings
      packing: true
      packing_efficiency_threshold: 0.8
      pack_single_sequences: false
      block_cross_document_attention: false  # Allow cross-document attention (default)
      
      # Other settings
      logging_steps: 10
      eval_steps: 50
      save_strategy: "steps"
      save_steps: 100
      evaluation_strategy: "steps"

# Configuration with cross-document attention BLOCKED
blocked_cross_attention:
  stages:
    - stage_name: sft_cross_attention_blocked
      stage_type: sft
      num_train_epochs: 1
      per_device_train_batch_size: 4
      per_device_eval_batch_size: 4
      gradient_accumulation_steps: 1
      learning_rate: 5e-5
      max_length: 512
      
      # Packing settings
      packing: true
      packing_efficiency_threshold: 0.8
      pack_single_sequences: false
      block_cross_document_attention: true  # Block cross-document attention
      
      # Other settings
      logging_steps: 10
      eval_steps: 50
      save_strategy: "steps"
      save_steps: 100
      evaluation_strategy: "steps"

# Usage instructions:
# 1. To test with cross-document attention allowed:
#    python scripts/train.py --config configs/examples/sft_cross_document_attention_comparison.yaml:allowed_cross_attention
#
# 2. To test with cross-document attention blocked:
#    python scripts/train.py --config configs/examples/sft_cross_document_attention_comparison.yaml:blocked_cross_attention
#
# This allows easy A/B testing to determine which approach works better for your specific data and use case.

# Expected behavior differences:
# - allowed_cross_attention: Tokens can attend to all previous tokens in the packed sequence, regardless of document boundaries
# - blocked_cross_attention: Tokens can only attend to previous tokens within the same document, plus standard causal masking

# Use cases for blocking cross-document attention:
# - When training on multiple independent documents/conversations
# - When you want to prevent information leakage between different contexts
# - When working with sensitive data where documents should remain isolated
# - When following strict document-level attention patterns

# Use cases for allowing cross-document attention:
# - When training on continuous text that spans multiple chunks
# - When documents in a pack are related (e.g., chapters from the same book)
# - When following standard LLM training practices (GPT, PaLM, etc.)
# - When you want maximum information flow for the model to learn from 