# Example configuration demonstrating custom packing with overlap chunking
# This config shows how to enable sequence packing for efficient training
# with pre-tokenized datasets created by overlap chunking

# Data configuration
data_config:
  dataset_name: "example_dataset"
  max_length: 2048
  truncation: true
  
  # Enable overlap chunking
  chunking:
    overlap_ratio: 0.15  # 15% overlap between chunks
    min_chunk_size: 100  # Minimum tokens per chunk
  
  # This will create pre-tokenized datasets with input_ids, attention_mask, labels

# Model configuration  
model_config:
  model_name: "microsoft/DialoGPT-medium"
  use_lora: true
  lora_config:
    r: 16
    lora_alpha: 32
    target_modules: ["c_attn", "c_proj"]
    lora_dropout: 0.1

# Training pipeline configuration
pipeline_config:
  stages:
    - stage_name: "sft"
      
      # Core training parameters
      num_train_epochs: 3.0
      per_device_train_batch_size: 4
      gradient_accumulation_steps: 4
      learning_rate: 2e-4
      weight_decay: 0.01
      max_length: 2048
      
      # Enable custom packing for efficiency
      packing: true
      packing_efficiency_threshold: 0.8    # 80% efficiency minimum
      pack_single_sequences: false         # Don't pack single sequences alone
      
      # Memory optimization
      gradient_checkpointing: true
      bf16: true
      
      # Logging and evaluation
      logging_steps: 10
      evaluation_strategy: "steps"
      eval_steps: 100
      save_strategy: "steps"
      save_steps: 500
      
      # Training optimization
      lr_scheduler_type: "cosine"
      warmup_ratio: 0.03
      max_grad_norm: 1.0

# Output configuration
output_config:
  base_output_dir: "experiments/sft_with_packing"
  run_name: "sft_packing_example"
  
# Logging configuration
logging_config:
  use_wandb: true
  wandb_project: "custom_packing_demo"
  
# Comments explaining the configuration:
# 
# 1. Data Processing:
#    - overlap_ratio: 0.15 creates 15% overlap between chunks
#    - This generates short, overlapping sequences ideal for packing
#
# 2. Custom Packing:
#    - packing: true enables sequence packing
#    - packing_efficiency_threshold: 0.8 means packs are finalized when 80% full
#    - pack_single_sequences: false prevents inefficient single-sequence packs
#
# 3. Expected Behavior:
#    - Training pipeline will detect pre-tokenized data (input_ids, attention_mask, labels)
#    - PackedSequenceCollator will be used automatically
#    - Multiple short sequences will be packed into each training example
#    - EOS tokens will separate sequences within each pack
#    - Training efficiency should improve significantly
#
# 4. Monitoring:
#    - Check logs for "Custom PackedSequenceCollator" detection messages
#    - Monitor packing efficiency percentages in debug logs
#    - WandB will track training metrics and efficiency improvements 